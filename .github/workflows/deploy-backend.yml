name: Deploy Backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deploy script
        shell: bash
        run: |
          scp -i ~/.ssh/id_rsa devops/deploy-ec2.sh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy-touristspot-backend.sh"

      - name: Run deploy on EC2
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod +x /tmp/deploy-touristspot-backend.sh && APP_DIR='${{ secrets.EC2_APP_DIR }}' BRANCH='master' HEALTH_URL='http://127.0.0.1:5000/api/health' /tmp/deploy-touristspot-backend.sh"
